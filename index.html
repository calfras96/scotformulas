let currentLevel = 'n5';

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab.${level}`).classList.add('active');
  document.getElementById('searchInput').value = '';
  renderFormulas();
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<span class="highlight">$1</span>');
}

function renderFormulas() {
  const container = document.getElementById('formulaContainer');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const topics = data[currentLevel];
  const labels = { n5:'National 5', higher:'Higher', adv:'Advanced Higher' };
  let html = `<span class="level-badge badge-${currentLevel}">${labels[currentLevel]}</span>`;
  let anyResults = false;

  topics.forEach((topic, ti) => {
    const filtered = query
      ? topic.formulas.filter(f =>
          f.name.toLowerCase().includes(query) ||
          f.math.toLowerCase().includes(query) ||
          f.desc.toLowerCase().includes(query) ||
          f.vars.some(v => v.toLowerCase().includes(query)))
      : topic.formulas;
    if (!filtered.length) return;
    anyResults = true;

    const cards = filtered.map(f => `
      <div class="formula-card">
        <div class="formula-name">${highlight(f.name, query)}</div>
        <div class="formula-math">${highlight(f.math, query)}</div>
        <div class="formula-desc">${highlight(f.desc, query)}</div>
        ${f.vars.length ? `<div class="formula-vars">${f.vars.map(v=>`<span class="var-tag">${highlight(v,query)}</span>`).join('')}</div>` : ''}
      </div>`).join('');

    html += `
      <div class="topic-section" id="tp-${currentLevel}-${ti}">
        <div class="topic-header" onclick="toggleTopic('tp-${currentLevel}-${ti}')">
          <span class="topic-title"><span class="topic-icon">${topic.icon}</span>${highlight(topic.topic, query)}</span>
          <span class="chevron">â–¾</span>
        </div>
        <div class="topic-body">${cards}</div>
      </div>`;
  });

  if (!anyResults) html += `<div class="empty"><span class="empty-emoji">ًں¤”</span>No formulas found for "${query}"</div>`;
  container.innerHTML = html;

  if (query) {
    document.querySelectorAll('.topic-section').forEach(s => s.classList.add('open'));
  } else {
    const first = document.querySelector('.topic-section');
    if (first) first.classList.add('open');
  }
}

function toggleTopic(id) { document.getElementById(id).classList.toggle('open'); }

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById('install-banner').classList.remove('show');
      deferredPrompt = null;
    });
  }
}

renderFormulas();
